<svg width="200" height="95" viewBox="0 0 200 95" fill="none" xmlns="http://www.w3.org/2000/svg">
  <rect width="200" height="95" fill="#F9FAFB"/>

  <!-- Central MCP card -->
  <rect x="70" y="22" width="60" height="51" rx="8" fill="white" stroke="#E6E6E6" stroke-width="1"/>

  <!-- MCP label bar -->
  <rect x="79" y="30" width="42" height="6" rx="3" fill="#EBECEF"/>

  <!-- Novu pink accent line -->
  <rect x="79" y="42" width="28" height="4" rx="2" fill="#DD2450" opacity="0.7"/>

  <!-- Sub lines -->
  <rect x="79" y="51" width="36" height="3" rx="1.5" fill="#EBECEF"/>
  <rect x="79" y="58" width="26" height="3" rx="1.5" fill="#EBECEF"/>

  <!-- Left node: Claude -->
  <rect x="14" y="34" width="38" height="27" rx="6" fill="white" stroke="#E6E6E6" stroke-width="1"/>
  <rect x="20" y="41" width="26" height="4" rx="2" fill="#EBECEF"/>
  <rect x="20" y="49" width="18" height="3" rx="1.5" fill="#EBECEF"/>

  <!-- Right node: Cursor -->
  <rect x="148" y="34" width="38" height="27" rx="6" fill="white" stroke="#E6E6E6" stroke-width="1"/>
  <rect x="154" y="41" width="26" height="4" rx="2" fill="#EBECEF"/>
  <rect x="154" y="49" width="18" height="3" rx="1.5" fill="#EBECEF"/>

  <!-- Connector lines -->
  <line x1="52" y1="47" x2="70" y2="47" stroke="#EBECEF" stroke-width="1.5" stroke-dasharray="3 2"/>
  <line x1="130" y1="47" x2="148" y2="47" stroke="#EBECEF" stroke-width="1.5" stroke-dasharray="3 2"/>

  <!-- Left dot on central card -->
  <circle cx="70" cy="47" r="3" fill="#DD2450" opacity="0.8"/>
  <!-- Right dot on central card -->
  <circle cx="130" cy="47" r="3" fill="#DD2450" opacity="0.8"/>

  <!-- Endpoint dots on side nodes -->
  <circle cx="52" cy="47" r="2.5" fill="#EBECEF"/>
  <circle cx="148" cy="47" r="2.5" fill="#EBECEF"/>
</svg>
